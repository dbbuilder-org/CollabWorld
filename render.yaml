services:
  - type: web
    name: collabworld-web
    runtime: node
    plan: starter
    region: oregon
    branch: main
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @collabworld/db generate && pnpm build
    startCommand: pnpm --filter @collabworld/web start
    healthCheckPath: /api/health
    numInstances: 1
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: collabworld-db
          property: connectionString
      - key: NEXT_PUBLIC_APP_URL
        value: https://collabworld.servicevision.io
      # Set the following in Render dashboard (sensitive):
      # NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
      # CLERK_SECRET_KEY
      # CLERK_WEBHOOK_SECRET
      # MUX_TOKEN_ID
      # MUX_TOKEN_SECRET
      # MUX_WEBHOOK_SECRET
      # RESEND_API_KEY
      # RESEND_FROM_EMAIL
      # STRIPE_SECRET_KEY
      # STRIPE_WEBHOOK_SECRET
      # NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
      # STRIPE_PREMIUM_PRICE_ID
      # UPSTASH_REDIS_REST_URL
      # UPSTASH_REDIS_REST_TOKEN
      # R2_ACCOUNT_ID
      # R2_ACCESS_KEY_ID
      # R2_SECRET_ACCESS_KEY
      # R2_BUCKET_NAME
      # R2_PUBLIC_URL
      # NEXT_PUBLIC_CLERK_SIGN_IN_URL
      # NEXT_PUBLIC_CLERK_SIGN_UP_URL
      # NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL
      # NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL

  - type: web
    name: collabworld-staging
    runtime: node
    plan: starter
    region: oregon
    branch: staging
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @collabworld/db generate && pnpm build
    startCommand: pnpm --filter @collabworld/web start
    healthCheckPath: /api/health
    numInstances: 1
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_APP_URL
        value: https://staging.collabworld.servicevision.io
      - key: DATABASE_URL
        fromDatabase:
          name: collabworld-db-staging
          property: connectionString

databases:
  - name: collabworld-db
    plan: basic-256mb
    region: oregon
    databaseName: collabworld
    user: collabworld

  - name: collabworld-db-staging
    plan: basic-256mb
    region: oregon
    databaseName: collabworld_staging
    user: collabworld_staging
